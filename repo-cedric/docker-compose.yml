version: '3.9'

services:

  # ─── Base de données PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cedric_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cedric
      POSTGRES_PASSWORD: cedric_secret
      POSTGRES_DB:       cedric_grimere
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cedric -d cedric_grimere"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ─── Serveur Node.js ────────────────────────────────────────────────────
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: cedric_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://cedric:cedric_secret@postgres:5432/cedric_grimere
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./back/uploads:/app/uploads

volumes:
  postgres_data: