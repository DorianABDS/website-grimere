services:
  - type: web
    name: cedric-grimere-back
    runtime: node
    rootDir: back
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PHOTOGRAPHE_NOM
        sync: false
      - key: PHOTOGRAPHE_VILLE
        sync: false
      - key: PHOTOGRAPHE_INSTAGRAM
        sync: false

  # ── Cron job : ping toutes les 5 min pour garder le backend éveillé ────────
  - type: cron
    name: cedric-grimere-keepalive
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: "echo ok"
    startCommand: >
      node -e "
        const https = require('https');
        const url = process.env.BACKEND_URL + '/api/health';
        https.get(url, (r) => {
          console.log('[keepalive]', r.statusCode, url);
          process.exit(0);
        }).on('error', (e) => {
          console.error('[keepalive] erreur:', e.message);
          process.exit(1);
        });
      "
    envVars:
      - key: BACKEND_URL
        value: https://cedric-grimere-backend.onrender.com
