<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Hero</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css?v=2"/>
<script src="config.js"></script>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item active" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em">CG<span style="color:var(--or)">.</span></div>
    <div style="width:24px"></div>
  </div>

  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Hero</div>
        <div class="page-sub">Contenu et image de fond de la section principale</div>
      </div>
    </div>

    <!-- Section Contenu -->
    <p class="section-label">Contenu</p>
    <div style="background:var(--charbon);border:1px solid var(--ardoise);border-radius:12px;padding:1.5rem;max-width:640px">
      <div class="form-group">
        <label class="form-label" for="hero-titre">Titre principal <span style="color:rgba(245,240,232,.3);font-size:.6rem;letter-spacing:.1em">— sauts de ligne = nouvelles lignes sur le site</span></label>
        <textarea class="form-input" id="hero-titre" rows="3" style="resize:vertical">Chaque instant
mérite
d'être éternel.</textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="hero-sous-titre">Sous-titre</label>
        <input class="form-input" type="text" id="hero-sous-titre" value="Photographe &amp; Artiste Visuelle"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="hero-description">Description</label>
        <textarea class="form-input" id="hero-description" rows="4" style="resize:vertical">Je capture l'émotion brute, la lumière fugace, les fragments de vie qui font une histoire. Basée à Port-de-Bouc, disponible partout.</textarea>
      </div>
      <button class="btn-primary" id="btn-save-content" onclick="sauvegarderContenu()">Sauvegarder le contenu</button>
    </div>

    <!-- Section Background -->
    <p class="section-label" style="margin-top:2rem">Background</p>
    <div style="background:var(--charbon);border:1px solid var(--ardoise);border-radius:12px;padding:1.5rem;display:flex;align-items:center;gap:1.5rem;max-width:640px">
      <div style="width:160px;height:90px;flex-shrink:0;position:relative;border-radius:8px;overflow:hidden">
        <div id="hero-bg-placeholder" style="position:absolute;inset:0;background:var(--ardoise);display:flex;align-items:center;justify-content:center">
          <span style="font-size:.62rem;color:rgba(245,240,232,.2);letter-spacing:.1em;text-transform:uppercase">Aucune image</span>
        </div>
        <img id="hero-bg-preview" src="" alt=""
             style="width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s;position:relative;z-index:1"/>
      </div>
      <div>
        <div style="font-size:.9rem;color:var(--or);margin-bottom:.4rem;font-weight:500">Background Hero</div>
        <div style="font-size:.78rem;color:rgba(245,240,232,.5);margin-bottom:1rem">Image affichée en arrière-plan de la section principale du site</div>
        <label class="btn-upload">
          Changer l'image
          <input type="file" accept="image/*" style="display:none" onchange="changerBackground(this)"/>
        </label>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js?v=2"></script>
<script src="js/hero.js?v=2"></script>
</body>
</html>
