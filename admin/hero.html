<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Hero</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
<script src="config.js"></script>
<style>
/* Overrides pour la zone de preview hero */
.main { padding: 0; }
.hero-preview {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
  background: var(--noir);
}
.hero-preview [contenteditable] { outline: none; cursor: text; }
.hero-preview [contenteditable]:hover { background: rgba(201,168,76,.06); }
.hero-preview [contenteditable]:focus { background: rgba(201,168,76,.09); }
.btn-save-fixed {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--or);
  color: #0d0d0d;
  border: none;
  padding: .85rem 2.2rem;
  font-size: .72rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  z-index: 1000;
  box-shadow: 0 4px 24px rgba(201,168,76,.35);
  transition: all .3s;
}
.btn-save-fixed:hover { background: #e8d5a3; }
.btn-change-bg {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  z-index: 10;
  background: rgba(13,13,13,.75);
  border: 1px solid rgba(201,168,76,.5);
  color: var(--or);
  font-size: .68rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: .55rem 1.1rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  backdrop-filter: blur(4px);
  transition: all .3s;
}
.btn-change-bg:hover { background: rgba(201,168,76,.15); }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item active" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em">CG<span style="color:var(--or)">.</span></div>
    <div style="width:24px"></div>
  </div>

  <!-- Preview Hero — rendu identique au site public -->
  <div class="hero-preview">
    <img id="hero-bg" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,#0d0d0d 0%,rgba(13,13,13,.65) 50%,rgba(13,13,13,.15) 100%)"></div>
    <div style="position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.4),transparent)"></div>

    <!-- Bouton changer background -->
    <label class="btn-change-bg">
      ↑ Changer le background
      <input type="file" accept="image/*" style="display:none" onchange="changerBackground(this)">
    </label>

    <div style="position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 2rem 5rem;width:100%">
      <p id="hero-sous-titre" contenteditable="true"
         style="color:var(--or);font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;margin-bottom:1rem;display:inline-block;font-family:'DM Sans',sans-serif"></p>
      <h1 id="hero-titre" contenteditable="true"
          style="font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,6rem);font-weight:300;line-height:1.05;max-width:700px;margin-bottom:1.5rem;color:#f5f0e8"></h1>
      <p id="hero-description" contenteditable="true"
         style="color:rgba(245,240,232,.55);font-size:.9rem;line-height:1.85;max-width:420px;margin-bottom:2.5rem;font-family:'DM Sans',sans-serif"></p>
    </div>

    <div style="position:absolute;bottom:2rem;right:2.5rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:1">
      <span style="color:rgba(245,240,232,.3);font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;writing-mode:vertical-rl;font-family:'DM Sans',sans-serif">Défiler</span>
      <div style="width:1px;height:3rem;background:linear-gradient(to bottom,rgba(201,168,76,.5),transparent)"></div>
    </div>
  </div>
</div>

<!-- Bouton sauvegarder fixe -->
<button id="btn-save" class="btn-save-fixed" onclick="sauvegarder()">Sauvegarder</button>

<script src="js/common.js"></script>
<script src="js/hero.js"></script>
</body>
</html>
