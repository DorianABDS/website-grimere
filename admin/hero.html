<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Hero</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
<link rel="stylesheet" href="css/admin.css"/>
<script src="config.js"></script>
<style>
.preview-hero {
  position: relative;
  min-height: 500px;
  background: var(--noir);
  overflow: hidden;
  border: 2px solid rgba(201,168,76,.3);
  border-radius: 8px;
  margin-bottom: 2rem;
}
.preview-hero [contenteditable] {
  outline: none;
  cursor: text;
  border-bottom: 1px dashed rgba(201,168,76,.4);
  transition: border-color .2s;
}
.preview-hero [contenteditable]:hover,
.preview-hero [contenteditable]:focus {
  border-bottom-color: var(--or);
  background: rgba(201,168,76,.05);
}
.edit-badge {
  position: absolute;
  top: 1rem;
  left: 1rem;
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.3);
  color: var(--or);
  font-size: .65rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: .3rem .7rem;
  border-radius: 4px;
  z-index: 10;
  font-family: 'DM Sans', sans-serif;
}
.btn-change-bg {
  position: absolute;
  top: 1rem;
  right: 1rem;
  z-index: 10;
  background: rgba(13,13,13,.8);
  border: 1px solid rgba(201,168,76,.5);
  color: var(--or);
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .5rem 1rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}
.btn-save-fixed {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--or);
  color: var(--noir);
  border: none;
  padding: .85rem 2rem;
  font-size: .8rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(201,168,76,.3);
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item active" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em">CG<span style="color:var(--or)">.</span></div>
    <div style="width:24px"></div>
  </div>

  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Hero</div>
        <div class="page-sub">Contenu et image de fond de la section principale</div>
      </div>
    </div>

    <!-- Bandeau info -->
    <div style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:.75rem 1.25rem;margin-bottom:1.5rem;font-size:.8rem;color:var(--or);font-family:'DM Sans',sans-serif;letter-spacing:.05em">
      Cliquez sur les textes pour les modifier. Glissez pour changer le background.
    </div>

    <!-- Preview Hero -->
    <div class="preview-hero">
      <span class="edit-badge">✎ Aperçu — cliquez pour modifier</span>
      <label class="btn-change-bg">
        Changer le background
        <input type="file" accept="image/*" style="display:none" onchange="changerBackground(this)">
      </label>
      <img id="hero-bg" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center">
      <div style="position:absolute;inset:0;background:linear-gradient(to top,#0d0d0d 0%,rgba(13,13,13,.65) 50%,rgba(13,13,13,.15) 100%)"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,.4),transparent)"></div>
      <div style="position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:3rem 2rem 4rem;width:100%">
        <p id="hero-sous-titre" class="tag" contenteditable="true" style="outline:none;cursor:text;border-bottom:1px dashed rgba(201,168,76,.4);display:inline-block"></p>
        <h1 id="hero-titre" contenteditable="true" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:300;line-height:1.05;max-width:700px;margin:1rem 0 1.5rem;color:var(--ivoire);outline:none;cursor:text;border-bottom:1px dashed rgba(201,168,76,.4)"></h1>
        <p id="hero-description" class="body-sm" contenteditable="true" style="max-width:420px;margin-bottom:2rem;outline:none;cursor:text;border-bottom:1px dashed rgba(201,168,76,.4)"></p>
      </div>
    </div>
  </div>
</div>

<button class="btn-save-fixed" id="btn-save" onclick="sauvegarder()">Sauvegarder</button>

<script src="js/common.js"></script>
<script src="js/hero.js"></script>
</body>
</html>
