<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Biographie</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
<script src="config.js"></script>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item active" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em">CG<span style="color:var(--or)">.</span></div>
    <div style="width:24px"></div>
  </div>

  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Biographie</div>
        <div class="page-sub">Textes, indicateurs et photo de la section biographie</div>
      </div>
    </div>

    <!-- Section Textes -->
    <p class="section-label">Textes</p>
    <div style="background:var(--charbon);border:1px solid var(--ardoise);border-radius:12px;padding:1.5rem;max-width:640px">
      <div class="form-group">
        <label class="form-label" for="bio-titre">Titre</label>
        <input class="form-input" type="text" id="bio-titre" placeholder="Titre de la section biographie"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="bio-sous-titre">Sous-titre</label>
        <input class="form-input" type="text" id="bio-sous-titre" placeholder="Sous-titre de la section biographie"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="bio-description">Description</label>
        <textarea class="form-input" id="bio-description" rows="5" placeholder="Texte de présentation biographique" style="resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="bio-citation">Citation</label>
        <textarea class="form-input" id="bio-citation" rows="3" placeholder="Citation mise en avant" style="resize:vertical"></textarea>
      </div>
    </div>

    <!-- Section Indicateurs -->
    <p class="section-label" style="margin-top:2rem">Indicateurs</p>
    <div style="background:var(--charbon);border:1px solid var(--ardoise);border-radius:12px;padding:1.5rem;max-width:640px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
        <input class="form-input" type="text" id="bio-ind1-val" placeholder="Valeur (ex: 10+)"/>
        <input class="form-input" type="text" id="bio-ind1-label" placeholder="Label (ex: Ans d'expérience)"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
        <input class="form-input" type="text" id="bio-ind2-val" placeholder="Valeur (ex: 500+)"/>
        <input class="form-input" type="text" id="bio-ind2-label" placeholder="Label (ex: Clients satisfaits)"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <input class="form-input" type="text" id="bio-ind3-val" placeholder="Valeur (ex: 50+)"/>
        <input class="form-input" type="text" id="bio-ind3-label" placeholder="Label (ex: Projets réalisés)"/>
      </div>
    </div>

    <!-- Section Photo de profil -->
    <p class="section-label" style="margin-top:2rem">Photo de profil</p>
    <div style="background:var(--charbon);border:1px solid var(--ardoise);border-radius:12px;padding:1.5rem;max-width:640px;display:flex;align-items:center;gap:1.5rem">
      <div style="width:120px;height:120px;flex-shrink:0;position:relative;border-radius:50%;overflow:hidden">
        <div id="bio-photo-placeholder" style="position:absolute;inset:0;background:var(--ardoise);border-radius:50%;display:flex;align-items:center;justify-content:center">
          <span style="font-size:.6rem;color:rgba(245,240,232,.2);letter-spacing:.08em;text-transform:uppercase;text-align:center;line-height:1.6">Aucune<br>photo</span>
        </div>
        <img id="bio-photo-preview" src="" alt=""
             style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;opacity:0;transition:opacity .3s;position:relative;z-index:1"/>
      </div>
      <div>
        <div style="font-size:.82rem;color:var(--or);margin-bottom:.3rem;font-weight:500">Photo de profil</div>
        <div style="font-size:.75rem;color:rgba(245,240,232,.35);margin-bottom:.85rem">Affichée dans la section biographie du site</div>
        <label class="btn-upload">
          Changer la photo
          <input type="file" accept="image/*" id="bio-photo-input" style="display:none" onchange="previewPhoto(this)"/>
        </label>
      </div>
    </div>

    <!-- Bouton Sauvegarder -->
    <div style="margin-top:2rem;max-width:640px">
      <button class="btn-primary" id="btn-save" onclick="sauvegarder()">Sauvegarder tout</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/biographie.js"></script>
</body>
</html>
