<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Biographie</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
<script src="config.js"></script>
<style>
:root { --ivoire:#f5f0e8; --or-pale:#e8d5a3; }
.main { padding: 0; }
.bio-preview { padding:6rem 0; background:var(--charbon); position:relative; overflow:hidden; min-height:100vh; }
.bio-preview [contenteditable] { outline:none; cursor:text; }
.bio-preview [contenteditable]:hover { background:rgba(201,168,76,.06); }
.bio-preview [contenteditable]:focus { background:rgba(201,168,76,.09); }
.tag-front { color:var(--or); font-size:.72rem; letter-spacing:.35em; text-transform:uppercase; margin-bottom:1rem; display:block; font-family:'DM Sans',sans-serif; }
.h2s { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3.2rem); font-weight:300; color:var(--ivoire); line-height:1.15; }
.body-sm-front { color:rgba(245,240,232,.55); font-size:.9rem; line-height:1.85; font-family:'DM Sans',sans-serif; }
.grid2 { display:grid; gap:4rem; }
@media(min-width:1024px){ .grid2 { grid-template-columns:1fr 1fr; gap:6rem; align-items:center; } }
.portrait-wrap { position:relative; }
.portrait-wrap img { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:top; filter:grayscale(1); transition:all .7s; display:block; }
.portrait-wrap:hover img { filter:grayscale(0); }
.portrait-frame { position:absolute; bottom:-1rem; right:-1rem; width:100%; height:100%; border:1px solid rgba(201,168,76,.3); pointer-events:none; }
.stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; padding:1.75rem 0; border-top:1px solid var(--ardoise); border-bottom:1px solid var(--ardoise); margin-bottom:2.5rem; }
.stat-val { font-family:'Cormorant Garamond',serif; font-size:2.2rem; color:var(--or); font-weight:300; }
.stat-lbl { color:rgba(245,240,232,.4); font-size:.68rem; letter-spacing:.08em; margin-top:.2rem; font-family:'DM Sans',sans-serif; }
.front-container { max-width:1200px; margin:0 auto; padding:0 2rem; }
@media(min-width:1024px){ .front-container { padding:0 3rem; } }
.change-photo-btn {
  position:absolute; bottom:1rem; left:50%; transform:translateX(-50%);
  background:rgba(13,13,13,.85); border:1px solid rgba(201,168,76,.5);
  color:var(--or); font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
  padding:.5rem 1rem; cursor:pointer; white-space:nowrap;
  font-family:'DM Sans',sans-serif; backdrop-filter:blur(4px); z-index:5;
}
.btn-save-fixed {
  position:fixed; bottom:2rem; right:2rem; background:var(--or); color:#0d0d0d;
  border:none; padding:.85rem 2.2rem; font-size:.72rem; letter-spacing:.2em;
  text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif;
  font-weight:500; z-index:1000; box-shadow:0 4px 24px rgba(201,168,76,.35); transition:all .3s;
}
.btn-save-fixed:hover { background:#e8d5a3; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item active" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
    <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.1em">CG<span style="color:var(--or)">.</span></div>
    <div style="width:24px"></div>
  </div>

  <!-- Preview Biographie — identique au site public -->
  <section class="bio-preview">
    <div style="position:absolute;top:0;right:0;width:16rem;height:16rem;border:1px solid rgba(201,168,76,.07);transform:rotate(45deg) translate(8rem,-8rem);pointer-events:none"></div>
    <div class="front-container">
      <div class="grid2">

        <!-- Portrait -->
        <div class="portrait-wrap">
          <img id="bio-photo" src="" alt="Portrait photographe">
          <div class="portrait-frame"></div>
          <label class="change-photo-btn">
            ↑ Changer la photo
            <input type="file" accept="image/*" style="display:none" onchange="previewPhoto(this)">
          </label>
        </div>

        <!-- Texte -->
        <div>
          <span id="bio-sous-titre" class="tag-front" contenteditable="true"></span>
          <h2 id="bio-titre" class="h2s" contenteditable="true" style="margin-bottom:.5rem"></h2>
          <div style="width:48px;height:1px;background:var(--or);margin:.8rem 0 1.5rem"></div>
          <p id="bio-description" class="body-sm-front" contenteditable="true" style="margin-bottom:2.5rem"></p>

          <!-- Indicateurs -->
          <div class="stats-bar">
            <div style="text-align:center">
              <div id="bio-ind1-val" class="stat-val" contenteditable="true"></div>
              <div id="bio-ind1-label" class="stat-lbl" contenteditable="true"></div>
            </div>
            <div style="text-align:center">
              <div id="bio-ind2-val" class="stat-val" contenteditable="true"></div>
              <div id="bio-ind2-label" class="stat-lbl" contenteditable="true"></div>
            </div>
            <div style="text-align:center">
              <div id="bio-ind3-val" class="stat-val" contenteditable="true"></div>
              <div id="bio-ind3-label" class="stat-lbl" contenteditable="true"></div>
            </div>
          </div>

          <!-- Citation -->
          <blockquote style="border-left:2px solid var(--or);padding-left:1.5rem;margin-top:1.5rem">
            <p id="bio-citation" contenteditable="true"
               style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:rgba(245,240,232,.65);font-style:italic;font-weight:300;outline:none;cursor:text"></p>
          </blockquote>
        </div>

      </div>
    </div>
  </section>
</div>

<button id="btn-save" class="btn-save-fixed" onclick="sauvegarder()">Sauvegarder</button>

<script src="js/common.js"></script>
<script src="js/biographie.js"></script>
</body>
</html>
