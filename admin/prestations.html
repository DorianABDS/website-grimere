<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Prestations</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="config.js"></script>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="cg">CG<span>.</span></div>
      <span class="admin-label">Administration</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
      <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
      <a class="nav-item active" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
      <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
      <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
      <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
    </nav>
    <div class="sidebar-profile">
      <div class="profile-avatar" id="profile-avatar">C</div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-email" id="profile-email"></div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
    </div>
  </aside>

  <main class="main">
    <div class="mobile-header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.08em">Prestations</div>
      <div style="width:24px"></div>
    </div>

    <div class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Prestations</div>
          <div class="page-sub" id="page-sub">Chargement…</div>
        </div>
      </div>
      <div class="presta-list" id="presta-list">
        <div class="loading">Chargement des prestations…</div>
      </div>
    </div>
  </main>

  <div class="modal-bg" id="modal-edit">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">Modifier la prestation</div>
      <form id="edit-form" onsubmit="savePrestation(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label class="form-label" for="edit-titre">Titre</label>
          <input class="form-input" type="text" id="edit-titre" required placeholder="Nom de la prestation">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-prix">Prix</label>
          <input class="form-input" type="text" id="edit-prix" required placeholder="Ex: 120€">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-sous-titre">Sous-titre</label>
          <input class="form-input" type="text" id="edit-sous-titre" placeholder="Description courte">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-badge">Badge</label>
          <input class="form-input" type="text" id="edit-badge" placeholder="Ex: Populaire, Nouveau…">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-details">Détails <span style="text-transform:none;letter-spacing:0;font-size:.62rem">(une ligne par détail)</span></label>
          <textarea class="form-input form-textarea" id="edit-details" placeholder="Prestation incluse&#10;Autre prestation…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" id="edit-populaire">
            <span class="form-check-label">Mettre en avant (populaire)</span>
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline-sm" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn-gold">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/prestations.js"></script>
</body>
</html>
