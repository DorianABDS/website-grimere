<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Avis clients</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="config.js"></script>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="cg">CG<span>.</span></div>
      <span class="admin-label">Administration</span>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
      <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
      <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
      <a class="nav-item active" href="avis.html"><span class="nav-icon">★</span> Avis clients<span id="badge-avis" class="nav-badge" style="background:rgba(251,191,36,.8);display:none"></span></a>
      <a class="nav-item" href="messages.html"><span class="nav-icon">◉</span> Messages<span id="badge-messages" class="nav-badge danger" style="display:none"></span></a>
      <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
    </nav>
    <div class="sidebar-profile">
      <div class="profile-avatar" id="profile-avatar">C</div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-email" id="profile-email"></div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
    </div>
  </aside>

  <main class="main">
    <div class="mobile-header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:.08em">Avis clients</div>
      <div style="width:24px"></div>
    </div>

    <div class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Avis clients</div>
          <div class="page-sub" id="page-sub">Chargement…</div>
        </div>
      </div>

      <div class="stat-banner">
        <div class="stat-banner-item">
          <div class="stat-banner-val" id="stat-note">—</div>
          <div class="stat-banner-lbl">Note moyenne</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-banner-item">
          <div class="stat-banner-val" id="stat-total">—</div>
          <div class="stat-banner-lbl">Avis au total</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-banner-item">
          <div class="stat-banner-val" id="stat-attente">—</div>
          <div class="stat-banner-lbl">En attente</div>
        </div>
      </div>

      <div class="filter-row">
        <button class="btn-outline-sm active-filter" data-filtre="tous" onclick="setFiltre('tous')">Tous</button>
        <button class="btn-outline-sm" data-filtre="EN_ATTENTE" onclick="setFiltre('EN_ATTENTE')">En attente</button>
        <button class="btn-outline-sm" data-filtre="APPROUVE" onclick="setFiltre('APPROUVE')">Approuvés</button>
        <button class="btn-outline-sm" data-filtre="REFUSE" onclick="setFiltre('REFUSE')">Refusés</button>
      </div>

      <div class="avis-grid" id="avis-grid">
        <div class="loading" style="grid-column:1/-1">Chargement des avis…</div>
      </div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/avis.js"></script>
</body>
</html>
