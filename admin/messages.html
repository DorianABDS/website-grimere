<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Messages</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css?v=2"/>
<script src="config.js"></script>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="cg">CG<span>.</span></div>
    <span class="admin-label">Administration</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item" href="hero.html"><span class="nav-icon">◫</span> Hero</a>
    <a class="nav-item" href="biographie.html"><span class="nav-icon">◑</span> Biographie</a>
    <a class="nav-item" href="galerie.html"><span class="nav-icon">◻</span> Galerie</a>
    <a class="nav-item" href="prestations.html"><span class="nav-icon">◇</span> Prestations</a>
    <a class="nav-item" href="avis.html"><span class="nav-icon">★</span> Avis clients<span class="nav-badge" id="badge-avis" style="display:none"></span></a>
    <a class="nav-item active" href="messages.html"><span class="nav-icon">◉</span> Messages<span class="nav-badge danger" id="badge-messages" style="display:none"></span></a>
    <a class="nav-item" href="stats.html"><span class="nav-icon">◎</span> Statistiques</a>
  </nav>
  <div class="sidebar-profile">
    <div class="profile-avatar" id="profile-avatar">C</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name"></div>
      <div class="profile-email" id="profile-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()" title="Déconnexion">⏻</button>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<main class="main">
  <div class="mobile-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300">CG<span style="color:var(--or)">.</span></span>
    <div style="width:28px"></div>
  </div>

  <div class="content" style="overflow:hidden;display:flex;flex-direction:column">
    <div class="page-header" style="flex-shrink:0">
      <div>
        <h1 class="page-title">Messages</h1>
        <p class="page-sub" id="page-sub">Chargement…</p>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" id="btn-actifs" onclick="switchView('actifs')">Actifs</button>
        <button class="filter-btn" id="btn-archives" onclick="switchView('archives')">Archivés</button>
      </div>
    </div>

    <div class="msg-layout">
      <div class="msg-list" id="msg-list">
        <div class="msg-empty">Chargement…</div>
      </div>
      <div class="msg-detail" id="msg-detail">
        <div class="msg-detail-empty">Sélectionnez un message pour le lire</div>
      </div>
    </div>
  </div>
</main>

<script src="js/common.js?v=2"></script>
<script src="js/messages.js?v=2"></script>
</body>
</html>
